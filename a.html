<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
let a=1;
while(a<=10){
    document.write(a+"<br>")
    a++;
}
let sum=0
for(let i=1;i<=10;i++){
    sum+=i;
}
document.write("sum:"+sum+"<br>");

let b=5;
for(i=1;i<=10;i++){
document.write(b*i+"<br>")
}

    </script>
    

</body>
</html>
